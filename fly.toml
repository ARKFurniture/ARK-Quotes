# fly.toml — ARK Furniture Quote System
# Deploy with: fly deploy

app = "ark-quotes"
primary_region = "yyz"  # Toronto — closest to Oshawa

[build]

[env]
  PORT = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

# Persistent volume for SQLite database
[mounts]
  source = "ark_data"
  destination = "/data"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
